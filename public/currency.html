<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>货币兑换 · 工作站</title>
    <!-- System fonts only -- no external dependencies -->
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #0a0a0e;
        --bg-elevated: #111116;
        --bg-card: rgba(20, 20, 28, 0.92);
        --bg-input: rgba(10, 10, 16, 0.5);
        --border: rgba(48, 48, 60, 0.4);
        --border-light: rgba(60, 60, 80, 0.3);
        --text: #eeeff4;
        --text2: #9898a8;
        --text3: #5c5c70;
        --green: #00d68f;
        --green-soft: #00c87e;
        --green-bg: rgba(0, 214, 143, 0.08);
        --green-glow: rgba(0, 214, 143, 0.12);
        --purple: #6c5ce7;
        --purple-bg: rgba(108, 92, 231, 0.08);
        --purple-glow: rgba(108, 92, 231, 0.15);
        --amber: #ffb84d;
        --radius: 18px;
        --radius-sm: 10px;
        --radius-pill: 30px;
        --shadow-card: 0 12px 48px rgba(0, 0, 0, 0.35);
        --transition: 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      }

      html {
        -webkit-text-size-adjust: 100%;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'Segoe UI Symbol',
          'Segoe UI Emoji', 'PingFang SC', 'HarmonyOS Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        -webkit-font-smoothing: antialiased;
        background-image:
          radial-gradient(ellipse 60% 50% at 50% 10%, rgba(0, 214, 143, 0.03) 0%, transparent 70%),
          radial-gradient(ellipse 40% 40% at 80% 80%, rgba(108, 92, 231, 0.02) 0%, transparent 60%);
      }

      /* === HEADER === */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 28px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-elevated);
        flex-shrink: 0;
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .header-back {
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--text3);
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
        padding: 6px 12px;
        border-radius: var(--radius-sm);
        transition: all var(--transition);
        border: 1px solid transparent;
      }
      .header-back:hover {
        color: var(--text);
        background: var(--bg-card);
        border-color: var(--border);
      }
      .header-back .arrow {
        font-size: 14px;
        transition: transform var(--transition);
      }
      .header-back:hover .arrow {
        transform: translateX(-2px);
      }
      .header-title {
        font-size: 16px;
        font-weight: 600;
        background: linear-gradient(135deg, var(--green), #00e8a0);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* === MAIN === */
      .main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 16px 40px;
      }

      /* === CARD === */
      .card {
        width: 100%;
        max-width: 480px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-card);
        padding: 32px 32px 28px;
        position: relative;
        overflow: hidden;
      }
      .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 20%;
        right: 20%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
      }

      /* === AMOUNT INPUT === */
      .amount-section {
        margin-bottom: 24px;
        position: relative;
        z-index: 1;
      }
      .amount-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--text3);
        margin-bottom: 8px;
      }
      .amount-input-wrap {
        position: relative;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 14px 16px;
        transition: border-color var(--transition);
        cursor: text;
      }
      .amount-input-wrap:focus-within {
        border-color: var(--green);
        box-shadow: 0 0 0 3px var(--green-bg);
      }
      .amount-prefix {
        font-size: 22px;
        font-weight: 500;
        color: var(--text2);
        position: absolute;
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
        transition: color var(--transition);
      }
      .amount-input-wrap:focus-within .amount-prefix {
        color: var(--text);
      }
      .amount-input {
        display: block;
        width: 100%;
        background: none;
        border: none;
        outline: none;
        color: var(--text);
        font-family: 'DM Mono', monospace;
        font-size: 28px;
        font-weight: 500;
        letter-spacing: -0.5px;
        padding-left: 32px;
        caret-color: var(--green);
      }
      .amount-input::placeholder {
        color: var(--text3);
      }
      /* Hide spinner */
      .amount-input::-webkit-inner-spin-button,
      .amount-input::-webkit-outer-spin-button {
        -webkit-appearance: none;
      }
      .amount-input[type='number'] {
        -moz-appearance: textfield;
      }

      /* === CURRENCY ROW === */
      .currency-section {
        margin-bottom: 24px;
        position: relative;
        z-index: 1;
      }
      .currency-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .currency-group {
        flex: 1;
      }
      .currency-label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text3);
        margin-bottom: 5px;
      }
      .currency-select-wrap {
        position: relative;
      }
      .currency-select {
        width: 100%;
        padding: 12px 32px 12px 14px;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text);
        font-family: 'DM Mono', 'Noto Sans SC', monospace;
        font-size: 16px;
        font-weight: 500;
        outline: none;
        cursor: pointer;
        transition: border-color var(--transition);
        -webkit-appearance: none;
        appearance: none;
      }
      .currency-select:hover {
        border-color: var(--border-light);
      }
      .currency-select:focus {
        border-color: var(--green);
        box-shadow: 0 0 0 3px var(--green-bg);
      }
      .currency-select-wrap::after {
        content: '▾';
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text3);
        font-size: 10px;
        pointer-events: none;
      }

      /* === SWAP BUTTON === */
      .swap-btn {
        flex-shrink: 0;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: var(--bg-elevated);
        color: var(--text2);
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--transition);
        margin-top: 20px;
        position: relative;
      }
      .swap-btn:hover {
        border-color: var(--purple);
        background: var(--purple-bg);
        color: var(--purple);
        transform: scale(1.05);
      }
      .swap-btn:active {
        transform: scale(0.95);
      }
      .swap-btn.spinning .swap-icon {
        animation: spin 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(180deg);
        }
      }

      /* === DIVIDER === */
      .divider {
        height: 1px;
        background: linear-gradient(90deg, var(--border), transparent);
        margin: 0 0 20px;
        position: relative;
        z-index: 1;
      }

      /* === RESULT === */
      .result-section {
        position: relative;
        z-index: 1;
      }
      .result-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--text3);
        margin-bottom: 6px;
      }
      .result-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }
      .result-amount {
        font-family: 'DM Mono', monospace;
        font-size: 34px;
        font-weight: 500;
        letter-spacing: -0.5px;
        color: var(--text);
        transition: color 0.2s;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .result-amount .currency-code {
        font-family: 'Noto Sans SC', sans-serif;
        font-size: 18px;
        font-weight: 600;
        color: var(--text2);
        margin-left: 6px;
      }
      .result-amount.animate {
        animation: resultPop 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      }
      @keyframes resultPop {
        0% {
          transform: translateY(4px);
          opacity: 0.6;
        }
        100% {
          transform: translateY(0);
          opacity: 1;
        }
      }

      /* === RATE INFO === */
      .rate-section {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 8px;
        padding: 8px 12px;
        background: var(--bg-input);
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
      }
      .rate-text {
        font-family: 'DM Mono', monospace;
        font-size: 12px;
        color: var(--text2);
      }
      .rate-text .green {
        color: var(--green);
      }
      .update-time {
        font-size: 11px;
        color: var(--text3);
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .update-time .dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        display: inline-block;
      }
      .update-time .dot.live {
        background: var(--green);
        box-shadow: 0 0 6px rgba(0, 214, 143, 0.3);
        animation: pulseDot 2s infinite;
      }
      .update-time .dot.fallback {
        background: var(--amber);
        box-shadow: 0 0 6px rgba(255, 184, 77, 0.3);
      }
      @keyframes pulseDot {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .update-time .status-label {
        font-size: 10px;
      }

      /* === QUICK AMOUNTS === */
      .quick-section {
        margin-top: 20px;
        position: relative;
        z-index: 1;
      }
      .quick-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
      }
      .quick-btn {
        padding: 8px 4px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        background: transparent;
        color: var(--text2);
        font-family: 'DM Mono', monospace;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all var(--transition);
      }
      .quick-btn:hover {
        border-color: var(--green);
        background: var(--green-bg);
        color: var(--green);
      }
      .quick-btn:active {
        transform: scale(0.96);
      }

      /* === ERROR === */
      .error-bar {
        display: none;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
        background: rgba(255, 107, 107, 0.08);
        border: 1px solid rgba(255, 107, 107, 0.2);
        border-radius: var(--radius-sm);
        font-size: 11px;
        color: #ff6b6b;
        margin-top: 12px;
        position: relative;
        z-index: 1;
      }
      .error-bar.show {
        display: flex;
      }

      /* === LOADING === */
      .loading-overlay {
        display: none;
        position: absolute;
        inset: 0;
        background: rgba(10, 10, 14, 0.5);
        backdrop-filter: blur(2px);
        border-radius: var(--radius);
        z-index: 10;
        align-items: center;
        justify-content: center;
      }
      .loading-overlay.show {
        display: flex;
      }
      .loading-spinner {
        width: 24px;
        height: 24px;
        border: 2px solid var(--border);
        border-top-color: var(--green);
        border-radius: 50%;
        animation: spinner 0.6s linear infinite;
      }
      @keyframes spinner {
        to {
          transform: rotate(360deg);
        }
      }

      /* === RESPONSIVE === */
      @media (max-width: 520px) {
        .header {
          padding: 12px 16px;
        }
        .header-title {
          font-size: 14px;
        }
        .card {
          padding: 24px 18px 20px;
          border-radius: 14px;
        }
        .amount-input {
          font-size: 24px;
        }
        .amount-prefix {
          font-size: 18px;
          left: 14px;
        }
        .amount-input-wrap {
          padding: 12px 14px;
        }
        .result-amount {
          font-size: 26px;
        }
        .result-amount .currency-code {
          font-size: 15px;
        }
        .main {
          padding: 14px 10px 24px;
        }
        .currency-select {
          font-size: 14px;
          padding: 10px 28px 10px 12px;
        }
        .swap-btn {
          width: 36px;
          height: 36px;
          font-size: 16px;
        }
        .rate-section {
          flex-direction: column;
          align-items: flex-start;
          gap: 4px;
        }
        .quick-row {
          grid-template-columns: repeat(4, 1fr);
        }
        .quick-btn {
          font-size: 12px;
          padding: 8px 2px;
        }
      }

      @media (max-width: 380px) {
        .card {
          padding: 18px 12px 16px;
        }
        .amount-input {
          font-size: 20px;
        }
        .result-amount {
          font-size: 22px;
        }
        .currency-row {
          gap: 4px;
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-left">
        <a href="/" class="header-back"><span class="arrow">←</span> 工作站</a>
        <span class="header-title">货币兑换</span>
      </div>
    </header>

    <main class="main">
      <div class="card">
        <!-- Loading -->
        <div class="loading-overlay" id="loadingOverlay">
          <div class="loading-spinner"></div>
        </div>

        <!-- Amount -->
        <div class="amount-section">
          <div class="amount-label">金额</div>
          <div class="amount-input-wrap" id="amountWrap">
            <span class="amount-prefix" id="amountPrefix">$</span>
            <input
              class="amount-input"
              id="amountInput"
              type="text"
              inputmode="decimal"
              value="1,000.00"
              autofocus
            />
          </div>
        </div>

        <!-- Currency Selectors -->
        <div class="currency-section">
          <div class="currency-row">
            <div class="currency-group">
              <div class="currency-label">从</div>
              <div class="currency-select-wrap">
                <select class="currency-select" id="fromCurrency"></select>
              </div>
            </div>
            <button class="swap-btn" id="swapBtn" title="互换货币">
              <span class="swap-icon">⇄</span>
            </button>
            <div class="currency-group">
              <div class="currency-label">至</div>
              <div class="currency-select-wrap">
                <select class="currency-select" id="toCurrency"></select>
              </div>
            </div>
          </div>
        </div>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Result -->
        <div class="result-section">
          <div class="result-label">兑换结果</div>
          <div class="result-row">
            <span class="result-amount" id="resultAmount">—</span>
          </div>
          <div class="rate-section">
            <span class="rate-text" id="rateText">加载汇率中...</span>
            <span class="update-time" id="updateTime">
              <span class="dot" id="statusDot"></span>
              <span id="statusText">获取中</span>
            </span>
          </div>
        </div>

        <!-- Quick Amounts -->
        <div class="quick-section">
          <div class="quick-row">
            <button class="quick-btn" data-amount="100">100</button>
            <button class="quick-btn" data-amount="500">500</button>
            <button class="quick-btn" data-amount="1000">1,000</button>
            <button class="quick-btn" data-amount="5000">5,000</button>
          </div>
        </div>

        <!-- Error -->
        <div class="error-bar" id="errorBar">
          <span>⚠</span>
          <span id="errorText">获取汇率失败，使用缓存数据</span>
        </div>
      </div>
    </main>

    <script>
      // ===== CURRENCY DATA =====
      const CURRENCIES = [
        { code: 'USD', name: '美元', symbol: '$' },
        { code: 'CNY', name: '人民币', symbol: '¥' },
        { code: 'EUR', name: '欧元', symbol: '€' },
        { code: 'JPY', name: '日元', symbol: '¥' },
        { code: 'GBP', name: '英镑', symbol: '£' },
        { code: 'KRW', name: '韩元', symbol: '₩' },
        { code: 'HKD', name: '港币', symbol: 'HK$' },
        { code: 'TWD', name: '台币', symbol: 'NT$' },
        { code: 'SGD', name: '新加坡元', symbol: 'S$' },
        { code: 'THB', name: '泰铢', symbol: '฿' },
        { code: 'AUD', name: '澳元', symbol: 'A$' },
        { code: 'CAD', name: '加元', symbol: 'C$' },
        { code: 'CHF', name: '瑞士法郎', symbol: 'Fr' },
        { code: 'NZD', name: '新西兰元', symbol: 'NZ$' },
        { code: 'INR', name: '印度卢比', symbol: '₹' },
        { code: 'MYR', name: '马来西亚林吉特', symbol: 'RM' },
      ];

      // Fallback rates relative to USD (approx as of mid-2026)
      const FALLBACK_RATES = {
        USD: 1,
        CNY: 7.2435,
        EUR: 0.924,
        JPY: 151.5,
        GBP: 0.789,
        KRW: 1320.0,
        HKD: 7.822,
        TWD: 32.1,
        SGD: 1.348,
        THB: 36.5,
        AUD: 1.528,
        CAD: 1.368,
        CHF: 0.908,
        NZD: 1.65,
        INR: 83.2,
        MYR: 4.72,
      };

      // ===== STATE =====
      let rates = null;
      let rateTimestamp = null;
      let useFallback = false;
      let isLoading = false;
      let lastFromCode = 'USD';
      let lastToCode = 'CNY';

      // ===== DOM REFS =====
      const fromSelect = document.getElementById('fromCurrency');
      const toSelect = document.getElementById('toCurrency');
      const amountInput = document.getElementById('amountInput');
      const amountPrefix = document.getElementById('amountPrefix');
      const resultAmount = document.getElementById('resultAmount');
      const rateText = document.getElementById('rateText');
      const updateTime = document.getElementById('updateTime');
      const statusText = document.getElementById('statusText');
      const statusDot = document.getElementById('statusDot');
      const errorBar = document.getElementById('errorBar');
      const errorText = document.getElementById('errorText');
      const loadingOverlay = document.getElementById('loadingOverlay');
      const swapBtn = document.getElementById('swapBtn');

      // ===== INIT =====
      function populateSelectors() {
        const opts = CURRENCIES.map(
          (c) => `<option value="${c.code}">${c.code} — ${c.symbol}</option>`
        ).join('');
        fromSelect.innerHTML = opts;
        toSelect.innerHTML = opts;
        fromSelect.value = 'USD';
        toSelect.value = 'CNY';
      }

      // Format number for display
      function formatAmount(value, code) {
        if (value == null || isNaN(value)) return '—';
        const currency = CURRENCIES.find((c) => c.code === code);
        const symbol = currency ? currency.symbol : '';
        const decimals = code === 'JPY' || code === 'KRW' ? 0 : 2;
        const formatted = value.toLocaleString('en-US', {
          minimumFractionDigits: decimals,
          maximumFractionDigits: decimals,
        });
        return `${symbol} ${formatted}`;
      }

      // Parse input to number
      function parseInput(str) {
        const cleaned = str.replace(/[^0-9.]/g, '');
        const val = parseFloat(cleaned);
        return isNaN(val) ? 0 : val;
      }

      // Format input value for display
      function formatInput(val) {
        if (val === 0 || val === '' || isNaN(val)) return '';
        return val.toLocaleString('en-US', {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        });
      }

      // Update prefix symbol
      function updatePrefix(code) {
        const currency = CURRENCIES.find((c) => c.code === code);
        amountPrefix.textContent = currency ? currency.symbol : '$';
      }

      // ===== RATE FETCHING =====
      async function fetchRates() {
        if (isLoading) return;
        isLoading = true;
        loadingOverlay.classList.add('show');
        errorBar.classList.remove('show');

        try {
          const resp = await fetch('https://api.frankfurter.app/latest?from=USD');
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const data = await resp.json();

          // Frankfurter returns { amount: 1, base: "USD", date: "2026-...", rates: { ... } }
          if (data && data.rates) {
            rates = { ...data.rates, USD: 1 };
            rateTimestamp = new Date();
            useFallback = false;
            updateStatus('live');
            updateRateDisplay();
            convert();
            return;
          }
          throw new Error('Invalid response');
        } catch (err) {
          console.warn('Rate fetch failed, using fallback:', err.message);
          rates = { ...FALLBACK_RATES };
          rateTimestamp = new Date();
          useFallback = true;
          updateStatus('fallback');
          errorText.textContent = '无法获取实时汇率，使用内置参考汇率';
          errorBar.classList.add('show');
          updateRateDisplay();
          convert();
        } finally {
          isLoading = false;
          loadingOverlay.classList.remove('show');
        }
      }

      function getRate(from, to) {
        if (!rates) return null;
        if (from === to) return 1;
        // rates are all relative to USD
        const fromToUSD = rates[from];
        const usdToTarget = rates[to];
        if (!fromToUSD || !usdToTarget) return null;
        return usdToTarget / fromToUSD;
      }

      function updateStatus(type) {
        if (type === 'live') {
          statusDot.className = 'dot live';
          statusText.textContent = '实时汇率';
        } else {
          statusDot.className = 'dot fallback';
          statusText.textContent = '参考汇率';
        }
      }

      function updateRateDisplay() {
        const from = fromSelect.value;
        const to = toSelect.value;
        const rate = getRate(from, to);
        if (rate !== null) {
          rateText.innerHTML = `1 <span class="green">${from}</span> = ${rate.toFixed(4)} <span class="green">${to}</span>`;
        }
      }

      function updateTimestamp() {
        if (!rateTimestamp) return;
        const now = new Date();
        const diff = Math.floor((now - rateTimestamp) / 1000);
        const timeStr = rateTimestamp.toLocaleTimeString('zh-CN', {
          hour: '2-digit',
          minute: '2-digit',
        });
        const label = useFallback ? '参考汇率' : '实时汇率';
        updateTime.innerHTML = `
    <span class="dot ${useFallback ? 'fallback' : 'live'}"></span>
    <span>${label} · ${timeStr}</span>`;
      }

      // ===== CONVERSION =====
      function convert() {
        const fromCode = fromSelect.value;
        const toCode = toSelect.value;
        const rawValue = parseInput(amountInput.value);
        const rate = getRate(fromCode, toCode);

        if (rate === null || !rates) {
          resultAmount.textContent = '—';
          return;
        }

        const result = rawValue * rate;
        const formatted = formatAmount(result, toCode);
        resultAmount.innerHTML = formatted;
        resultAmount.classList.remove('animate');
        // Force reflow to restart animation
        void resultAmount.offsetWidth;
        resultAmount.classList.add('animate');

        updateRateDisplay();
        updatePrefix(fromCode);
        lastFromCode = fromCode;
        lastToCode = toCode;
      }

      // ===== EVENTS =====

      // Parse and format input on blur
      function handleInputBlur() {
        const val = parseInput(amountInput.value);
        if (val === 0) {
          amountInput.value = '';
        } else {
          amountInput.value = formatInput(val);
        }
        convert();
      }

      // Real-time conversion as user types (parse the raw input)
      amountInput.addEventListener('input', () => {
        convert();
      });

      amountInput.addEventListener('blur', handleInputBlur);

      // Focus: select all text
      amountInput.addEventListener('focus', function () {
        this.select();
      });

      // Currency change
      fromSelect.addEventListener('change', () => {
        updatePrefix(fromSelect.value);
        convert();
      });
      toSelect.addEventListener('change', convert);

      // Swap
      swapBtn.addEventListener('click', () => {
        const fromVal = fromSelect.value;
        const toVal = toSelect.value;
        fromSelect.value = toVal;
        toSelect.value = fromVal;

        // Animate
        const icon = swapBtn.querySelector('.swap-icon');
        icon.style.transform = 'rotate(180deg)';
        icon.style.transition = 'transform 0.35s cubic-bezier(0.22,1,0.36,1)';
        setTimeout(() => {
          icon.style.transform = '';
          icon.style.transition = '';
        }, 400);

        updatePrefix(fromSelect.value);
        convert();
      });

      // Quick amounts
      document.querySelectorAll('.quick-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const val = parseInt(btn.dataset.amount);
          amountInput.value = formatInput(val);
          convert();
        });
      });

      // Keyboard: Enter triggers conversion & blur
      amountInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          amountInput.blur();
        }
      });

      // ===== INIT =====
      populateSelectors();
      updatePrefix('USD');
      fetchRates();

      // Refresh rates every 10 minutes
      setInterval(
        () => {
          fetchRates();
        },
        10 * 60 * 1000
      );

      // Update timestamp display every 30s
      setInterval(() => {
        updateTimestamp();
      }, 30000);
    </script>
  </body>
</html>
